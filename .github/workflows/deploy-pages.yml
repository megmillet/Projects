name: Deploy Amazon Co-Product Purchasing Analysis to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'Amazon Co-Product Purchasing Network Analysis/application_presentation.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp "Amazon Co-Product Purchasing Network Analysis/application_presentation.html" _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
